name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.22.2
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Verify Git-less environment hygiene behavior
        shell: bash
        run: |
          set -euo pipefail
          archive="$(mktemp -d)"
          git archive HEAD | tar -x -C "$archive"
          ln -s "$GITHUB_WORKSPACE/node_modules" "$archive/node_modules"
          cd "$archive"
          npx vitest run tests/scripts/envFileHygiene.test.ts --reporter=verbose
      - name: Build
        run: npm run build
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm run test
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
      - name: Record audit-control closure
        if: github.head_ref == 'agent/close-audit-control-findings'
        run: python scripts/temporary_close_audit_control_findings.py
      - name: Persist audit-control closure
        if: github.head_ref == 'agent/close-audit-control-findings'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          BRANCH: agent/close-audit-control-findings
        run: |
          set -euo pipefail
          for file in \
            docs/quality/current-status.md \
            docs/quality/risk-register.md \
            docs/quality/reconciliations/2026-07-24-audit-control-cleanup.md; do
            sha="$(gh api "repos/$REPOSITORY/contents/$file?ref=$BRANCH" --jq .sha)"
            content="$(base64 -w 0 "$file")"
            gh api --method PUT "repos/$REPOSITORY/contents/$file" \
              -f message='docs: close audit-control findings' \
              -f content="$content" \
              -f sha="$sha" \
              -f branch="$BRANCH" >/dev/null
          done
