name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.22.2
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Verify Git-less environment hygiene behavior
        shell: bash
        run: |
          set -euo pipefail
          archive="$(mktemp -d)"
          git archive HEAD | tar -x -C "$archive"
          ln -s "$GITHUB_WORKSPACE/node_modules" "$archive/node_modules"
          cd "$archive"
          npx vitest run tests/scripts/envFileHygiene.test.ts --reporter=verbose
      - name: Build
        run: npm run build
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm run test
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
      - name: Bootstrap authenticated browser E2E
        if: github.head_ref == 'agent/add-authenticated-browser-e2e'
        run: python scripts/temporary_bootstrap_browser_e2e.py
      - name: Persist authenticated browser E2E
        if: github.head_ref == 'agent/add-authenticated-browser-e2e'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          BRANCH: agent/add-authenticated-browser-e2e
        run: |
          set -euo pipefail
          files=(
            package.json
            package-lock.json
            .gitignore
            playwright.config.ts
            e2e/global-setup.ts
            e2e/authenticated-browser.spec.ts
            .github/workflows/browser-e2e.yml
            tests/scripts/browserE2EWorkflow.test.ts
            docs/quality/reconciliations/2026-07-24-authenticated-browser-e2e.md
          )
          for file in "${files[@]}"; do
            content="$(base64 -w 0 "$file")"
            if sha="$(gh api "repos/$REPOSITORY/contents/$file?ref=$BRANCH" --jq .sha 2>/dev/null)"; then
              gh api --method PUT "repos/$REPOSITORY/contents/$file" \
                -f message='test: add authenticated browser e2e foundation' \
                -f content="$content" \
                -f sha="$sha" \
                -f branch="$BRANCH" >/dev/null
            else
              gh api --method PUT "repos/$REPOSITORY/contents/$file" \
                -f message='test: add authenticated browser e2e foundation' \
                -f content="$content" \
                -f branch="$BRANCH" >/dev/null
            fi
          done
