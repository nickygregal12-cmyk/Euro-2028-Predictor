name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.22.2
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run lint
      - run: npm run test
      - run: npm audit --omit=dev --audit-level=high
