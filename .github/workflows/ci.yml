name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.22.2
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Verify Git-less environment hygiene behavior
        shell: bash
        run: |
          set -euo pipefail
          archive="$(mktemp -d)"
          git archive HEAD | tar -x -C "$archive"
          ln -s "$GITHUB_WORKSPACE/node_modules" "$archive/node_modules"
          cd "$archive"
          npx vitest run tests/scripts/envFileHygiene.test.ts --reporter=verbose
      - name: Build
        run: npm run build
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm run test
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
