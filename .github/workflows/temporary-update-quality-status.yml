name: Temporary quality-status reconciliation

on:
  pull_request:
    paths:
      - '.github/workflows/temporary-update-quality-status.yml'
      - 'scripts/temporary_reconcile_quality_status.py'
      - 'docs/quality/current-status.md'
      - 'docs/quality/risk-register.md'

permissions:
  contents: write

jobs:
  reconcile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/repair-audit-controls
          fetch-depth: 0
      - name: Reconcile quality status
        run: python scripts/temporary_reconcile_quality_status.py
      - name: Commit reconciliation or diagnostic
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add docs/quality/current-status.md docs/quality/risk-register.md
          if [[ -e docs/quality/reconciliations/temporary-status-reconcile-error.txt ]]; then
            git add docs/quality/reconciliations/temporary-status-reconcile-error.txt
          fi
          if git diff --cached --quiet; then
            echo 'No reconciliation changes were produced.'
            exit 1
          fi
          git diff --cached --check
          git commit -m 'docs: reconcile audit-control status'
          git push origin HEAD:agent/repair-audit-controls
