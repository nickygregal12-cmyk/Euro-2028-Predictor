name: Temporary quality-status reconciliation

on:
  pull_request:
    paths:
      - '.github/workflows/temporary-update-quality-status.yml'
      - 'scripts/temporary_reconcile_quality_status.py'
      - 'docs/quality/current-status.md'
      - 'docs/quality/risk-register.md'

permissions:
  contents: write

jobs:
  reconcile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/repair-audit-controls
          fetch-depth: 0
      - name: Reconcile quality status
        run: python scripts/temporary_reconcile_quality_status.py
      - name: Write reconciled files through GitHub contents API
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          BRANCH: agent/repair-audit-controls
        run: |
          set -euo pipefail
          for file in docs/quality/current-status.md docs/quality/risk-register.md; do
            sha="$(gh api "repos/$REPOSITORY/contents/$file?ref=$BRANCH" --jq .sha)"
            content="$(base64 -w 0 "$file")"
            gh api --method PUT "repos/$REPOSITORY/contents/$file" \
              -f message='docs: reconcile audit-control status' \
              -f content="$content" \
              -f sha="$sha" \
              -f branch="$BRANCH" >/dev/null
          done
