<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="Euro 2028 Predictor">
  <!-- "28" monogram — the app's navy (#0A1128) tile with the green accent
       (#22E06C) in Space Grotesk. favicon.ico / apple-touch-icon.png are the
       pixel-faithful raster copies for engines that use them; this SVG falls
       back to a geometric sans where Space Grotesk isn't installed
       (indistinguishable at favicon size). -->
  <rect width="64" height="64" rx="14" fill="#0A1128"/>
  <text x="32" y="34" fill="#22E06C" text-anchor="middle" dominant-baseline="central"
        font-family="'Space Grotesk', ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-weight="500" font-size="36" letter-spacing="0.5">28</text>
</svg>
